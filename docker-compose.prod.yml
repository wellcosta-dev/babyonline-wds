version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babyonline-app
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: babyonline-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-babyonline}
      POSTGRES_USER: ${POSTGRES_USER:-babyonline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-babyonline} -d ${POSTGRES_DB:-babyonline}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:

